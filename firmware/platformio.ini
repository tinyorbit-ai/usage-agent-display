; PlatformIO project for the ESP32-2432S028R "Cheap Yellow Display" (ADR 0005).
; Device build/flash:  pio run -e cyd -t upload
; Host unit test:      bun run firmware/test/run-native.ts   (the automated firmware gate)
;
; Library versions are PINNED (supply-chain discipline). The board pin map lives in
; build_flags so swapping boards is a config change, not a code rewrite.

[env:cyd]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
; 921600 caused "Invalid head of packet" on the CYD's USB-serial adapter; 460800 is reliable.
upload_speed = 460800

lib_deps =
    lvgl/lvgl@8.4.0
    bodmer/TFT_eSPI@2.5.43
    bblanchon/ArduinoJson@7.2.1
    ; Touch on a dedicated HSPI bus (ADR 0015). EXACT pin: the v1.4 tag's commit SHA on
    ; GitHub. The PlatformIO registry only carries a 2019 alpha whose begin() can't take a
    ; custom SPIClass; v1.4 adds begin(SPIClass&), which the dedicated-bus wiring needs.
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git#d57f64c8b5f2bc5b8d10d121550806eeff7b06d9

build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I src
    ; --- TFT_eSPI driver config for ESP32-2432S028R (ILI9341 + XPT2046) ---
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
